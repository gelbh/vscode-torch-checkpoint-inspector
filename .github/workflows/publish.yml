# Publishes to the Visual Studio Marketplace and Open VSX.
# Duplicate versions are rejected by both registries — bump package.json, commit, then tag.
name: Publish extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: publish-extension-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install publishers
        run: npm install -g @vscode/vsce ovsx

      - name: Verify tag matches package.json (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "Git tag: v${TAG}  package.json: ${PKG}"
          test "${TAG}" = "${PKG}"

      - name: Publish to Visual Studio Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: vsce publish

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: ovsx publish
